global:
  smtp_from: "jf.formation.dst@gmail.com"
  smtp_smarthost: "smtp.gmail.com:587"
  smtp_auth_username: "jf.formation.dst@gmail.com"
  smtp_auth_password_file: "/etc/alertmanager/smtp_password"
  smtp_require_tls: true

route:
  group_by: ["alertname"]
  group_wait: 5s         # Réduit à 5s pour accélérer l'envoi lors de la démo
  group_interval: 1m
  repeat_interval: 3h
  receiver: "default-receiver"

receivers:
  - name: "default-receiver"
    email_configs:
      - to: "jf.formation.dst@gmail.com"
        send_resolved: true