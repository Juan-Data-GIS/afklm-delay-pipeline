global:
  scrape_interval: 5s
  evaluation_interval: 5s

# Configuration de l'Alertmanager
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

# Chargement des règles d'alertes
rule_files:
  - "alert.rules"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "postgres-analytics"
    static_configs:
      - targets: ["postgres_exporter:9187"]

  - job_name: "fastapi-service"
    static_configs:
      - targets: ["fastapi:8000"]

  - job_name: "docker-containers-cadvisor"
    static_configs:
      - targets: ["afklm-formation-cadvisor:8080"]